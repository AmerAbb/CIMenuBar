name: CIMenuBar
options:
  bundleIdPrefix: com.osn
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  CIMenuBar:
    type: application
    platform: macOS
    sources:
      - Sources/CIMenuBar
    dependencies:
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: Sources/CIMenuBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/CIMenuBar/CIMenuBar.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.osn.CIMenuBar
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.2.1"
        CURRENT_PROJECT_VERSION: "0.2.1"

  CIMenuBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/CIMenuBarTests
    dependencies:
      - target: CIMenuBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osn.CIMenuBarTests
        SWIFT_VERSION: "5.9"
